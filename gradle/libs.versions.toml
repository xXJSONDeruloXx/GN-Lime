androidx-room-runtime = { module = "androidx.room:room-runtime", version.ref = "room-runtime" }

# TODO: Remove 'version' once 1.8.0 is rolled into stable BOM, see https://developer.android.com/jetpack/androidx/releases/compose-ui
#   This fixes `Placement happened before lookahead` crash when animating lists items.
androidx-ui = { group = "androidx.compose.ui", name = "ui", version = "1.8.0-beta01" }

androidx-ui-graphics = { group = "androidx.compose.ui", name = "ui-graphics" }
androidx-ui-tooling = { group = "androidx.compose.ui", name = "ui-tooling" }
androidx-ui-tooling-preview = { group = "androidx.compose.ui", name = "ui-tooling-preview" }
apache-compress = { group = "org.apache.commons", name = "commons-compress", version.ref = "apache-compress" }
apng = { group = "com.github.penfeizhou.android.animation", name = "apng", version.ref = "apng" }
compose-settings-ui = { module = "com.github.alorma.compose-settings:ui-tiles", version.ref = "settings" }
