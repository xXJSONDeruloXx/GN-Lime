name: Create tagged release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configure release keystore
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
        run: |
          mkdir -p app/keystores
          echo "$KEYSTORE" | base64 --decode > app/keystores/gnlime-release.jks
          cat > app/keystores/keystore.properties <<'PROPS'
          storeFile=keystores/gnlime-release.jks
          PROPS
          sed -i 's/^[[:space:]]*//' app/keystores/keystore.properties
          echo "keyAlias=$KEYSTORE_KEY_ALIAS" >> app/keystores/keystore.properties
          echo "storePassword=$KEYSTORE_STORE_PASSWORD" >> app/keystores/keystore.properties
          echo "keyPassword=$KEYSTORE_KEY_PASSWORD" >> app/keystores/keystore.properties

      - name: Inject optional local properties
        run: |
          : > local.properties
          [ -n "${{ secrets.POSTHOG_API_KEY }}" ]       && echo 'POSTHOG_API_KEY=${{ secrets.POSTHOG_API_KEY }}'             >> local.properties || true
          [ -n "${{ secrets.POSTHOG_HOST }}" ]           && echo 'POSTHOG_HOST=${{ secrets.POSTHOG_HOST }}'                   >> local.properties || true
          [ -n "${{ secrets.STEAMGRIDDB_API_KEY }}" ]    && echo 'STEAMGRIDDB_API_KEY=${{ secrets.STEAMGRIDDB_API_KEY }}'     >> local.properties || true
          [ -n "${{ secrets.CLOUD_PROJECT_NUMBER }}" ]   && echo 'CLOUD_PROJECT_NUMBER=${{ secrets.CLOUD_PROJECT_NUMBER }}'   >> local.properties || true
          echo "--- local.properties ---"
          cat local.properties

      - name: Build signed release APK
        run: ./gradlew :app:assembleRelease-signed

      - name: Rename APK for release
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          APK=$(find app/build/outputs/apk/release-signed -name '*.apk' | head -n 1)
          cp "$APK" "GN-Lime-${TAG}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: false
          generate_release_notes: true
          files: GN-Lime-${{ github.ref_name }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
