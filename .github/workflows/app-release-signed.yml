name: Android signed APK CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - ".github/ISSUE_TEMPLATE/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configure release keystore
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
        run: |
          mkdir -p app/keystores
          echo "$KEYSTORE" | base64 --decode > app/keystores/gnlime-release.jks
          cat > app/keystores/keystore.properties <<'PROPS'
          storeFile=keystores/gnlime-release.jks
          PROPS
          sed -i 's/^[[:space:]]*//' app/keystores/keystore.properties
          echo "keyAlias=$KEYSTORE_KEY_ALIAS" >> app/keystores/keystore.properties
          echo "storePassword=$KEYSTORE_STORE_PASSWORD" >> app/keystores/keystore.properties
          echo "keyPassword=$KEYSTORE_KEY_PASSWORD" >> app/keystores/keystore.properties

      - name: Inject optional local properties
        run: |
          : > local.properties
          [ -n "${{ secrets.POSTHOG_API_KEY }}" ]       && echo 'POSTHOG_API_KEY=${{ secrets.POSTHOG_API_KEY }}'             >> local.properties || true
          [ -n "${{ secrets.POSTHOG_HOST }}" ]           && echo 'POSTHOG_HOST=${{ secrets.POSTHOG_HOST }}'                   >> local.properties || true
          [ -n "${{ secrets.STEAMGRIDDB_API_KEY }}" ]    && echo 'STEAMGRIDDB_API_KEY=${{ secrets.STEAMGRIDDB_API_KEY }}'     >> local.properties || true
          [ -n "${{ secrets.CLOUD_PROJECT_NUMBER }}" ]   && echo 'CLOUD_PROJECT_NUMBER=${{ secrets.CLOUD_PROJECT_NUMBER }}'   >> local.properties || true
          echo "--- local.properties ---"
          cat local.properties

      - name: Download libredirect from source-built release
        run: |
          # Source-built from https://github.com/xXJSONDeruloXx/libredirect
          # Tagged release for app.gnlime — no binary patching needed
          RELEASE_TAG="app.gnlime-b3027c2"
          curl -sL "https://github.com/xXJSONDeruloXx/libredirect/releases/download/${RELEASE_TAG}/redirect.tzst" \
            -o app/src/main/assets/redirect.tzst
          ls -la app/src/main/assets/redirect.tzst

      - name: Build signed release APK
        run: ./gradlew :app:assembleRelease-signed

      - name: Install Android SDK Build Tools
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          fi
          yes | "$SDKMANAGER" --install "build-tools;34.0.0"

      - name: Verify APK signature
        run: |
          BUILD_TOOLS_DIR="${ANDROID_HOME}/build-tools/34.0.0"
          if [ ! -d "$BUILD_TOOLS_DIR" ]; then
            BUILD_TOOLS_DIR="${ANDROID_SDK_ROOT}/build-tools/34.0.0"
          fi
          APK=$(find app/build/outputs/apk/release-signed -name '*.apk' | head -n 1)
          "${BUILD_TOOLS_DIR}/apksigner" verify --verbose --print-certs "$APK"

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gn-lime-release-signed
          path: app/build/outputs/apk/release-signed/*.apk

      - name: Resolve version and tag
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="v${VERSION}+${SHORT_SHA}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"

      - name: Rename APK for release
        run: |
          APK=$(find app/build/outputs/apk/release-signed -name '*.apk' | head -n 1)
          cp "$APK" "GN-Lime-${{ steps.version.outputs.tag }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: GN Lime ${{ steps.version.outputs.tag }}
          prerelease: false
          generate_release_notes: true
          files: GN-Lime-${{ steps.version.outputs.tag }}.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
