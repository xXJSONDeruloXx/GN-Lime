name: Android signed APK CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - ".github/ISSUE_TEMPLATE/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configure release keystore
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
        run: |
          mkdir -p app/keystores
          echo "$KEYSTORE" | base64 --decode > app/keystores/gnlime-release.jks
          cat <<EOF > app/keystores/keystore.properties
          storeFile=keystores/gnlime-release.jks
          keyAlias=$KEYSTORE_KEY_ALIAS
          storePassword=$KEYSTORE_STORE_PASSWORD
          keyPassword=$KEYSTORE_KEY_PASSWORD
          EOF

      - name: Inject optional local properties
        run: |
          cat <<EOF > local.properties
          POSTHOG_API_KEY=${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_HOST=${{ secrets.POSTHOG_HOST }}
          STEAMGRIDDB_API_KEY=${{ secrets.STEAMGRIDDB_API_KEY }}
          CLOUD_PROJECT_NUMBER=${{ secrets.CLOUD_PROJECT_NUMBER }}
          EOF

      - name: Build signed release APK
        run: ./gradlew :app:assembleRelease-signed

      - name: Install Android SDK Build Tools
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          fi
          yes | "$SDKMANAGER" --install "build-tools;34.0.0"

      - name: Verify APK signature
        run: |
          BUILD_TOOLS_DIR="${ANDROID_HOME}/build-tools/34.0.0"
          if [ ! -d "$BUILD_TOOLS_DIR" ]; then
            BUILD_TOOLS_DIR="${ANDROID_SDK_ROOT}/build-tools/34.0.0"
          fi
          APK=$(find app/build/outputs/apk/release-signed -name '*.apk' | head -n 1)
          "${BUILD_TOOLS_DIR}/apksigner" verify --verbose --print-certs "$APK"

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gn-lime-release-signed
          path: app/build/outputs/apk/release-signed/*.apk
